name: Deploy Resume

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/apps/resume
            cd ~/apps/resume
            git clone https://github.com/tariknaeem/resume.git /tmp/resume-deploy 2>/dev/null || (cd /tmp/resume-deploy && git pull)
            cp /tmp/resume-deploy/index.html ~/apps/resume/
            cp /tmp/resume-deploy/Dockerfile ~/apps/resume/
            cp /tmp/resume-deploy/docker-compose.yml ~/apps/resume/
            docker compose up -d --build
            rm -rf /tmp/resume-deploy
