name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t resume .
      - name: Validate HTML
        run: |
          for f in *.html; do
            echo "Checking $f..."
            grep -q "<html" "$f" && echo "  Valid HTML structure" || echo "  Warning: missing html tag"
          done
